services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vdidex-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?MSSQL_SA_PASSWORD must be set in .env}"
      MSSQL_PID: "Developer"
    volumes:
      - vdidex-mssql-data:/var/opt/mssql
    restart: unless-stopped

volumes:
  vdidex-mssql-data:
